mock_matrix_publisher:
  ros__parameters:
    # 模拟矩阵发布话题。后续真实视觉节点也应尽量沿用这个话题名。
    tray_matrix_topic: /sorting/tray_matrix

    # 模拟节点发布周期，单位秒。真实相机方案可能改为苗盘到位后触发发布。
    publish_period_sec: 1.0

    # 模拟数据的 header.frame_id。真实相机接入后应改为真实相机坐标系名称。
    camera_frame_id: mock_camera

camera_input_probe:
  ros__parameters:
    # RealSense ROS 2 默认 RGB 图像话题。实际话题名以 ros2 topic list 为准。
    color_image_topic: /camera/camera/color/image_raw

    # RealSense ROS 2 默认深度图话题。实际话题名以 ros2 topic list 为准。
    depth_image_topic: /camera/camera/depth/image_rect_raw

    # 状态打印周期，单位秒。
    report_period_sec: 2.0

camera_info_probe:
  ros__parameters:
    # RealSense ROS 2 默认 RGB 相机内参话题。实际话题名以 ros2 topic list 为准。
    color_camera_info_topic: /camera/camera/color/camera_info

    # RealSense ROS 2 默认深度相机内参话题。实际话题名以 ros2 topic list 为准。
    depth_camera_info_topic: /camera/camera/depth/camera_info

real_matrix_publisher:
  ros__parameters:
    # 输出苗盘矩阵话题，后续 driver 节点订阅这个话题。
    tray_matrix_topic: /sorting/tray_matrix

    # 当前早期规则节点定时发布。真机流程稳定后可改为苗盘到位触发。
    publish_period_sec: 1.0

    # 留空时使用 RGB 图像 frame_id。
    camera_frame_id: ''

    # RealSense 图像与内参话题。深度最好使用已对齐到 RGB 的话题。
    color_image_topic: /camera/camera/color/image_raw
    depth_image_topic: /camera/camera/depth/image_rect_raw
    color_camera_info_topic: /camera/camera/color/camera_info
    depth_camera_info_topic: /camera/camera/depth/camera_info

    # 三个苗盘在图像中的临时 ROI，格式为 [x, y, width, height]，单位 pixel。
    # 这些默认值只用于 640x480 画面上的初步联调，现场需要按相机安装位置修改。
    tray_1_roi: [20.0, 50.0, 185.0, 380.0]
    tray_2_roi: [227.5, 50.0, 185.0, 380.0]
    tray_3_roi: [435.0, 50.0, 185.0, 380.0]

    # 早期规则分类参数。leaf 阈值来自 docs/vision_algorithm 视觉算法说明.md 的初始建议。
    leaf_area_ratio_threshold: 0.20
    weak_area_ratio_threshold: 0.03
    depth_window_px: 5
    roi_inner_scale: 0.65
    color_sample_step_px: 2

grid_debug_publisher:
  ros__parameters:
    # 输入 RGB 图像话题。普通 USB 相机调试时可用 -p color_image_topic:=/image 覆盖。
    color_image_topic: /camera/camera/color/image_raw

    # 输出带 ROI 框、网格线和穴位中心点的调试图像。
    debug_image_topic: /sorting/debug/grid_image

    # 与 real_matrix_publisher 使用同一组三苗盘 ROI，方便边看边调。
    tray_1_roi: [20.0, 50.0, 185.0, 380.0]
    tray_2_roi: [227.5, 50.0, 185.0, 380.0]
    tray_3_roi: [435.0, 50.0, 185.0, 380.0]

    # 调试图像绘制参数，单位 pixel。
    debug_line_width_px: 2
    debug_center_radius_px: 3
